<section class="contact section" id="contact">

            <div class="contact__info-list reveal">
                <a href="mailto:nquyetthang.work@gmail.com" class="contact__item">
                    <div class="contact__item-icon"><i class='bx bx-envelope'></i></div>
                    <div>
                        <div class="contact__item-label">Email</div>
                        <div class="contact__item-value">nquyetthang.work@gmail.com</div>
                    </div>
                </a>
                <a href="tel:+447944476097" class="contact__item">
                    <div class="contact__item-icon"><i class='bx bx-phone'></i></div>
                    <div>
                        <div class="contact__item-label">Phone</div>
                        <div class="contact__item-value">+44 7944 476097</div>
                    </div>
                </a>
                <div class="contact__item">
                    <div class="contact__item-icon"><i class='bx bx-map'></i></div>
                    <div>
                        <div class="contact__item-label">Location</div>
                        <div class="contact__item-value">Nottingham, United Kingdom</div>
                    </div>
                </div>
                <a href="https://linkedin.com/in/andythang" target="_blank" class="contact__item">
                    <div class="contact__item-icon"><i class='bx bxl-linkedin'></i></div>

                    </div>
