<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quyet Thang Nguyen (Andy) — Junior Software Engineer specialising in React/Next.js, Python, Java, and Swift. Based in Nottingham, UK.">
    <meta name="keywords" content="Quyet Thang Nguyen, Andy, software engineer, portfolio, React, Next.js, Python, Java, Swift, Nottingham">
    <meta name="author" content="Quyet Thang Nguyen">

    <!-- Open Graph -->
    <meta property="og:title" content="Quyet Thang Nguyen — Software Engineer">
    <meta property="og:description" content="Junior software engineer specialising in React/Next.js, backend development, and iOS apps.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kobach0812.github.io">

    <!-- Fonts & icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/styles.css">

    <title>Quyet Thang Nguyen — Software Engineer</title>
</head>
<body>
    <div id="header-container"></div>

    <main>
        <div id="home-container"></div>
        <div id="about-container"></div>
        <div id="education-container"></div>
        <div id="skills-container"></div>
        <div id="projects-container"></div>
        <div id="experience-container"></div>
        <div id="awards-container"></div>
        <div id="contact-container"></div>
    </main>

    <div id="footer-container"></div>

    <script>
        // Load all partials in parallel, run init scripts afterwards
        const partials = [
            ['header-container',     'header.html'],
            ['home-container',       'home.html'],
            ['about-container',      'about.html'],
            ['education-container',  'education.html'],
            ['skills-container',     'skills.html'],
            ['projects-container',   'projects.html'],
            ['experience-container', 'experience.html'],
            ['awards-container',     'awards.html'],
            ['contact-container',    'contact.html'],
            ['footer-container',     'footer.html'],
        ];

        Promise.all(partials.map(([id, file]) =>
            fetch(file)
                .then(r => r.text())
                .then(html => {
                    const el = document.getElementById(id);
                    el.innerHTML = html;
                    // Execute any inline <script> tags inside the partial
                    el.querySelectorAll('script').forEach(old => {
                        const s = document.createElement('script');
                        if (old.src) s.src = old.src;
                        else s.textContent = old.textContent;
                        document.body.appendChild(s);
                    });
                })
                .catch(err => console.error('Failed to load', file, err))
        )).then(initPage);

        function initPage() {
            // Mobile nav toggle
            const toggle = document.getElementById('nav-toggle');
            const menu = document.getElementById('nav-menu');
            if (toggle && menu) {
                toggle.addEventListener('click', () => menu.classList.toggle('show'));
                menu.querySelectorAll('.nav__link, .nav__cta').forEach(link =>
                    link.addEventListener('click', () => menu.classList.remove('show'))
                );
            }

            // Scroll reveal via IntersectionObserver
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('visible');
                        io.unobserve(e.target);
                    }
                });
            }, { threshold: 0.12 });
            document.querySelectorAll('.reveal').forEach(el => io.observe(el));

            // Active nav link on scroll
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav__link');
            window.addEventListener('scroll', () => {
                const y = window.scrollY + 100;
                sections.forEach(sec => {
                    if (y >= sec.offsetTop && y < sec.offsetTop + sec.offsetHeight) {
                        const id = sec.getAttribute('id');
                        navLinks.forEach(l => l.classList.toggle('active',
                            l.getAttribute('href') === '#' + id));
                    }
                });
            });
        }
    </script>
</body>
</html>
